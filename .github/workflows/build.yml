name: Build onnxruntime for Android (Python 3.12)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Setup NDK
        run: |
          echo "NDK_VERSION=26b" >> $GITHUB_ENV
          mkdir -p $ANDROID_HOME/ndk
          cd $ANDROID_HOME/ndk
          curl -sL https://dl.google.com/android/repository/android-ndk-r26b-linux.zip -o ndk.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/android-ndk-r26b" >> $GITHUB_ENV
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy wheel auditwheel
          
      - name: Download onnxruntime source
        run: |
          git clone --depth 1 --branch 1.19.0 https://github.com/microsoft/onnxruntime
          
      - name: Build onnxruntime
        run: |
          cd onnxruntime
          export ANDROID_NDK=$ANDROID_NDK_HOME
          export PATH=$ANDROID_NDK/bin:$PATH
          mkdir -p build/Release/dist
          python tools/ci_build/build.py \
            --android \
            --android_abis arm64-v8a \
            --android_sdk_path $ANDROID_HOME \
            --android_ndk_path $ANDROID_NDK \
            --python_version 3.12 \
            --config Release \
            --build_wheel
        shell: bash
        timeout-minutes: 180
        
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-cp312-aarch64
          path: onnxruntime/build/Release/dist/*.whl
          retention-days: 30
