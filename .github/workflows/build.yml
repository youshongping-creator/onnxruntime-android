name: Build onnxruntime for Android (Python 3.12)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Android NDK
        uses: nttthanhctt/setup-ndk@main
        with:
          ndk-version: r26b
          
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy wheel
          
      - name: Download onnxruntime source
        run: |
          git clone --depth 1 --branch 1.19.0 https://github.com/microsoft/onnxruntime
          
      - name: Build onnxruntime
        run: |
          cd onnxruntime
          ./build.sh --config Release --android --android_abi arm64-v8a \
            --android_sdk_path $ANDROID_HOME \
            --android_ndk_path $ANDROID_NDK \
            --python_version 3.12 \
            --build_wheel \
            --parallel
        shell: bash
        
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-cp312-aarch64
          path: onnxruntime/build/Release/dist/*.whl
          retention-days: 30
