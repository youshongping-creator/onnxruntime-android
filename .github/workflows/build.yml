name: Build onnxruntime for Android (Python 3.13)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install Python 3.13
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.13 python3.13-dev python3.13-venv
          python3.13 --version
          
      - name: Install system dependencies
        run: |
          sudo apt-get install -y wget unzip curl git cmake ninja-build openjdk-17-jdk
          # Set Java 17 as default
          sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          # Verify installations
          java -version
          ninja --version
          echo "✅ Java 17 and Ninja installed"
          
      - name: Setup Android NDK from system (no SDK download needed)
        run: |
          echo "=== Using system pre-installed Android NDK ==="
          
          # Check for system NDK installations
          echo "Searching for system NDK installations..."
          SYSTEM_NDK_PATHS=(
            "/usr/local/lib/android/sdk/ndk"
            "/opt/android-sdk/ndk"
            "$HOME/android-sdk/ndk"
            "/usr/lib/android-sdk/ndk"
          )
          
          NDK_DIR=""
          for path in "${SYSTEM_NDK_PATHS[@]}"; do
            if [ -d "$path" ]; then
              echo "✅ Found NDK directory: $path"
              # Find the highest version NDK
              LATEST_NDK=$(find "$path" -maxdepth 1 -type d -name "*" | sort -V | tail -1)
              if [ -n "$LATEST_NDK" ] && [ -d "$LATEST_NDK" ]; then
                NDK_DIR="$LATEST_NDK"
                echo "✅ Selected NDK: $NDK_DIR"
                break
              fi
            fi
          done
          
          # Fallback: use the NDK path found in previous build logs
          if [ -z "$NDK_DIR" ]; then
            echo "⚠️  No system NDK found in standard locations"
            NDK_DIR="/usr/local/lib/android/sdk/ndk/27.3.13750724"
            echo "⚠️  Trying fallback path from previous build: $NDK_DIR"
          fi
          
          # Verify NDK directory exists
          if [ ! -d "$NDK_DIR" ]; then
            echo "❌ NDK directory not found: $NDK_DIR"
            echo "Listing possible NDK locations:"
            find /usr -name "android.toolchain.cmake" 2>/dev/null | head -10
            find /usr/local -name "android.toolchain.cmake" 2>/dev/null | head -10
            find /opt -name "android.toolchain.cmake" 2>/dev/null | head -10
            echo "Will attempt build with CMake auto-detection"
            NDK_DIR=""
          else
            echo "✅ Verified NDK directory: $NDK_DIR"
            echo "NDK version: $(basename "$NDK_DIR")"
            
            # Check for toolchain file
            TOOLCHAIN_FILE="$NDK_DIR/build/cmake/android.toolchain.cmake"
            if [ -f "$TOOLCHAIN_FILE" ]; then
              echo "✅ Found Android toolchain file: $TOOLCHAIN_FILE"
            else
              echo "⚠️  No android.toolchain.cmake found, CMake will use built-in Android support"
              TOOLCHAIN_FILE=""
            fi
          fi
          
          # Set environment variables
          if [ -n "$NDK_DIR" ]; then
            echo "ANDROID_NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
            echo "NDK_DIR=$NDK_DIR" >> $GITHUB_ENV
          fi
          
          if [ -n "$TOOLCHAIN_FILE" ]; then
            echo "TOOLCHAIN_FILE=$TOOLCHAIN_FILE" >> $GITHUB_ENV
          fi
          
          echo "=== NDK Setup Summary ==="
          echo "ANDROID_NDK_HOME: ${NDK_DIR:-<system auto-detection>}"
          echo "TOOLCHAIN_FILE: ${TOOLCHAIN_FILE:-<CMake built-in support>}"
          echo "Java version:"
          java -version
        timeout-minutes: 10
        
      - name: Install Python dependencies
        run: |
          curl -sS https://bootstrap.pypa.io/get-pip.py | python3.13
          python3.13 -m pip install --upgrade pip setuptools wheel
          # Install numpy and verify it's available
          python3.13 -m pip install numpy
          python3.13 -c "import numpy; print(f'NumPy version: {numpy.__version__}')"
          # Also install pybind11 for CMake detection
          python3.13 -m pip install pybind11
          echo "✅ Python dependencies installed"
          
      - name: Download onnxruntime
        run: |
          echo "=== Cloning onnxruntime ==="
          echo "Repository: https://github.com/microsoft/onnxruntime"
          echo "Branch/Tag: v1.24.4"
          
          # Try cloning with verbose output
          if git clone --verbose --depth 1 --branch v1.24.4 https://github.com/microsoft/onnxruntime 2>&1 | tee clone.log; then
            echo "✅ onnxruntime cloned successfully"
          else
            echo "❌ git clone failed with branch v1.24.4, trying latest release tag"
            # Try to get latest release tag
            LATEST_TAG=$(curl -s https://api.github.com/repos/microsoft/onnxruntime/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
            echo "Latest release tag: $LATEST_TAG"
            
            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v1.24.4"  # fallback
            fi
            
            echo "Trying with tag: $LATEST_TAG"
            if git clone --verbose --depth 1 --branch "$LATEST_TAG" https://github.com/microsoft/onnxruntime 2>&1 | tee clone.log; then
              echo "✅ onnxruntime cloned with tag $LATEST_TAG"
            else
              echo "❌ Failed with tag $LATEST_TAG, trying main branch"
              if git clone --verbose --depth 1 https://github.com/microsoft/onnxruntime 2>&1 | tee clone.log; then
                echo "✅ onnxruntime cloned from main branch"
                cd onnxruntime
                echo "Checking out latest stable tag..."
                LATEST_STABLE=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.24.4")
                git checkout "$LATEST_STABLE" 2>&1 | tee -a clone.log
                cd ..
                echo "✅ Checked out $LATEST_STABLE"
              else
                echo "❌ All clone attempts failed"
                echo "=== Clone log ==="
                cat clone.log
                exit 1
              fi
            fi
          fi
          
          echo "=== Verifying clone ==="
          echo "Directory contents:"
          ls -la onnxruntime/
          
          echo "=== Checking for CMakeLists.txt ==="
          # Check for nested directory structure (onnxruntime/onnxruntime/)
          if [ -f "onnxruntime/onnxruntime/CMakeLists.txt" ]; then
            echo "✅ CMakeLists.txt found at onnxruntime/onnxruntime/CMakeLists.txt"
            echo "File size: $(wc -l < onnxruntime/onnxruntime/CMakeLists.txt) lines"
            # Rename directory to simplify path
            mv onnxruntime onnxruntime-full
            mv onnxruntime-full/onnxruntime onnxruntime
            echo "✅ Simplified directory structure"
          elif [ -f "onnxruntime/CMakeLists.txt" ]; then
            echo "✅ CMakeLists.txt found at onnxruntime/CMakeLists.txt"
            echo "File size: $(wc -l < onnxruntime/CMakeLists.txt) lines"
          elif [ -f "onnxruntime/cmake/CMakeLists.txt" ]; then
            echo "⚠️  CMakeLists.txt found at onnxruntime/cmake/CMakeLists.txt (subdirectory)"
            echo "File size: $(wc -l < onnxruntime/cmake/CMakeLists.txt) lines"
            echo "⚠️  This may indicate a non-standard directory structure"
            echo "⚠️  Attempting to continue with build..."
          else
            echo "❌ CMakeLists.txt not found in expected locations"
            echo "Searching for CMakeLists.txt in all locations:"
            find . -name "CMakeLists.txt" -type f | head -10
            echo "Listing all files in onnxruntime:"
            find onnxruntime -type f -name "*.txt" -o -name "CMake*" -o -name "*.cmake" | head -30
            echo "Top-level files:"
            ls -la onnxruntime/
            echo "⚠️  Build may fail, but continuing to attempt..."
          fi
          
      - name: Build onnxruntime with cmake
        run: |
          echo "=== Debug Information ==="
          echo "Current directory: $(pwd)"
          echo "Python3.13 path: $(which python3.13)"
          echo "Java version:"
          java -version
          
          # Use environment variables set by previous step
          echo "ANDROID_NDK_HOME: ${ANDROID_NDK_HOME:-<not set, using CMake auto-detection>}"
          echo "TOOLCHAIN_FILE: ${TOOLCHAIN_FILE:-<not set>}"
          
          # Set SQLOUD_ROOT if not set (for compatibility)
          if [ -z "$SQLOUD_ROOT" ]; then
            export SQLOUD_ROOT=$HOME/android-sdk
            echo "SQLOUD_ROOT set to: $SQLOUD_ROOT"
          fi
          
          # Check onnxruntime directory
          echo "=== Checking onnxruntime directory ==="
          ls -la onnxruntime/
          echo "CMakeLists.txt exists: $(if [ -f "onnxruntime/CMakeLists.txt" ]; then echo "✅ Yes"; else echo "❌ No"; fi)"
          
          cd onnxruntime
          echo "=== Inside onnxruntime directory ==="
          echo "Current directory: $(pwd)"
          ls -la | head -20
          
          # Determine CMake source directory
          CMAKE_SOURCE_DIR="."
          if [ -f "CMakeLists.txt" ]; then
            echo "✅ Using current directory as CMake source (CMakeLists.txt found)"
            CMAKE_SOURCE_DIR="."
          elif [ -f "cmake/CMakeLists.txt" ]; then
            echo "⚠️  CMakeLists.txt found in cmake/ subdirectory"
            echo "⚠️  Trying to use cmake/ as CMake source directory"
            CMAKE_SOURCE_DIR="cmake"
          else
            echo "❌ No CMakeLists.txt found in expected locations"
            echo "⚠️  Will attempt CMake configuration anyway (may fail)"
            CMAKE_SOURCE_DIR="."
          fi
          
          mkdir -p build/Release
          
          echo "=== Starting CMake configuration ==="
          echo "CMake source directory: $CMAKE_SOURCE_DIR"
          echo "Build directory: build/Release"
          
          # Verify critical paths before CMake
          echo "=== Verifying critical paths ==="
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          echo "SQLOUD_ROOT: $SQLOUD_ROOT"
          
          # Smart toolchain file detection for Android NDK
          echo "=== Smart toolchain file detection ==="
          
          # Check if TOOLCHAIN_FILE is already set from environment and valid
          if [ -n "$TOOLCHAIN_FILE" ] && [ -f "$TOOLCHAIN_FILE" ]; then
            echo "✅ Using toolchain file from environment: $TOOLCHAIN_FILE"
            # Keep using the existing TOOLCHAIN_FILE
          else
            echo "No valid toolchain file in environment, starting detection..."
            
            # Search for toolchain files in NDK directory
            echo "Searching for android.toolchain.cmake files..."
            FOUND_TOOLCHAINS=$(find "$ANDROID_NDK_HOME" -name "android.toolchain.cmake" -type f 2>/dev/null | head -5)
            
            if [ -n "$FOUND_TOOLCHAINS" ]; then
              echo "Found toolchain files:"
              echo "$FOUND_TOOLCHAINS"
              # Use the first found toolchain file
              TOOLCHAIN_FILE=$(echo "$FOUND_TOOLCHAINS" | head -1)
              echo "✅ Using toolchain file: $TOOLCHAIN_FILE"
            else
              echo "❌ No android.toolchain.cmake files found in NDK!"
              
              # Check for CMake's built-in Android support
              echo "Checking for CMake built-in Android support..."
              CMAKE_ANDROID_MODULE=$(cmake --system-information 2>/dev/null | grep -i "android" || echo "No Android module found")
              echo "CMake Android support: $CMAKE_ANDROID_MODULE"
              
              # Try to find CMake's Platform/Android.cmake
              CMAKE_PREFIX=$(cmake --system-information 2>/dev/null | grep '^CMAKE_ROOT' | cut -d '"' -f2)
              if [ -n "$CMAKE_PREFIX" ]; then
                CMAKE_ANDROID_FILE="$CMAKE_PREFIX/Modules/Platform/Android.cmake"
                if [ -f "$CMAKE_ANDROID_FILE" ]; then
                  echo "✅ Found CMake built-in Android support: $CMAKE_ANDROID_FILE"
                  # We'll let CMake use its built-in Android support without explicit toolchain
                  TOOLCHAIN_FILE=""
                else
                  echo "❌ CMake built-in Android support not found"
                  # Create a minimal toolchain file as last resort
                  echo "Will attempt to create minimal toolchain configuration..."
                  TOOLCHAIN_FILE=""
                fi
              else
                echo "⚠️ Could not determine CMake prefix"
                TOOLCHAIN_FILE=""
              fi
            fi
          fi
          
          echo "Final toolchain file: ${TOOLCHAIN_FILE:-<using CMake built-in Android support>}"
          
          echo "=== Checking Ninja ==="
          which ninja || echo "Ninja not in PATH"
          ninja --version || echo "Failed to get ninja version"
          
          echo "=== Starting CMake configuration (with detailed output) ==="
          # Build Python wheel with onnxruntime
          set +e  # Don't exit on error for CMake
          
          # Build CMake command with conditional toolchain file
          CMAKE_CMD="cmake \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_NDK=\"$ANDROID_NDK_HOME\" \
            -DANDROID_SDK_ROOT=\"$SQLOUD_ROOT\" \
            -DSQLOUD_ROOT=\"$SQLOUD_ROOT\" \
            -Donnxruntime_RUN_ONNX_TESTS=OFF \
            -Donnxruntime_BUILD_SHARED_LIB=ON \
            -Donnxruntime_ENABLE_PYTHON=OFF \
            -Donnxruntime_DEV_MODE=OFF \
            -Donnxruntime_BUILD_DEBUG_SYMBOLS=OFF \
            -Donnxruntime_BUILD_UNIT_TESTS=OFF \
            -Donnxruntime_BUILD_PYTHON_WHEELS=OFF \
            -Donnxruntime_MINIMAL_BUILD=OFF \
            -DCMAKE_CXX_FLAGS=\"-D_GLIBCXX_USE_CXX11_ABI=1\""
          
          # Add toolchain file if found
          if [ -n "$TOOLCHAIN_FILE" ] && [ -f "$TOOLCHAIN_FILE" ]; then
            CMAKE_CMD="$CMAKE_CMD -DCMAKE_TOOLCHAIN_FILE=\"$TOOLCHAIN_FILE\""
            echo "Using explicit toolchain file: $TOOLCHAIN_FILE"
          else
            echo "No explicit toolchain file, relying on CMake's built-in Android support"
            # Try to help CMake find Android toolchain
            CMAKE_CMD="$CMAKE_CMD -DCMAKE_SYSTEM_NAME=Android"
          fi
          
          # Complete CMake command
          CMAKE_CMD="$CMAKE_CMD -B build/Release -S \"$CMAKE_SOURCE_DIR\""
          
          echo "Executing CMake command:"
          echo "$CMAKE_CMD"
          
          eval "$CMAKE_CMD 2>&1 | tee cmake_output.log"
          
          CMAKE_EXIT_CODE=$?
          set -e  # Restore error exit
          
          echo "=== CMake configuration completed ==="
          echo "CMake exit code: $CMAKE_EXIT_CODE"
          
          # Check if CMake cache was created
          if [ -f "build/Release/CMakeCache.txt" ]; then
            echo "✅ CMakeCache.txt created successfully"
            echo "CMakeCache.txt size: $(wc -l < build/Release/CMakeCache.txt) lines"
          else
            echo "❌ CMakeCache.txt NOT created"
            echo "CMake likely failed to configure"
          fi
          
          # Only attempt build if CMake configuration succeeded
          if [ $CMAKE_EXIT_CODE -eq 0 ] && [ -f "build/Release/CMakeCache.txt" ]; then
            echo "=== Starting build (CMake config succeeded) ==="
            cmake --build build/Release --config Release --parallel 2>&1 | tee build_output.log
            
            BUILD_EXIT_CODE=$?
            echo "=== Build completed ==="
            echo "Build exit code: $BUILD_EXIT_CODE"
            
            if [ $BUILD_EXIT_CODE -eq 0 ]; then
              # Build Python wheel
              cd build/Release
              echo "=== Building Python wheel ==="
              python3.13 -m pip wheel . --no-deps --wheel-dir dist/ 2>&1 | tee wheel_output.log || echo "Direct wheel build failed"
            else
              echo "❌ Build failed, skipping wheel creation"
              cd build/Release  # Still cd to collect logs
            fi
          else
            echo "❌ CMake configuration failed, skipping build"
            echo "Will still attempt to collect debug information"
            mkdir -p build/Release
            cd build/Release
          fi
          
          # Find all built files
          echo "=== Searching for built files ==="
          find . -name "*.whl" -o -name "*.so" | head -20
          
          # Check if wheel was created
          if ls dist/*.whl 2>/dev/null; then
            echo "✅ Wheel file created successfully"
          else
            echo "❌ No wheel file found in dist/"
            echo "Listing dist directory:"
            ls -la dist/ 2>/dev/null || echo "dist/ directory does not exist"
          fi
        timeout-minutes: 300
        
      - name: Find built wheel
        run: |
          find onnxruntime/build -name "*.whl" -type f 2>/dev/null
          find onnxruntime/build -name "onnxruntime*.so" -type f 2>/dev/null | head -5
          
      - name: Upload wheel
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-cp313-aarch64
          path: |
            onnxruntime/build/Release/dist/*.whl
            onnxruntime/build/Release/*.so
          retention-days: 30
          if-no-files-found: error
          
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: onnxruntime/build/Release/**/*.log
          retention-days: 7
