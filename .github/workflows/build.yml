name: Build onnxruntime for Android (Python 3.13)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install Python 3.13
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.13 python3.13-dev python3.13-venv
          python3.13 --version
          
      - name: Install system dependencies
        run: |
          sudo apt-get install -y \
            wget unzip curl git cmake ninja-build \
            openjdk-17-jdk swig \
            android-sdk sdkmanager
            
      - name: Download Android SDK command-line tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          
      - name: Download Android NDK
        run: |
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager --install "ndk;26b" 2>&1 | tail -5
          echo "ANDROID_NDK_HOME=$HOME/android-sdk/ndk/26b" >> $GITHUB_ENV
        timeout-minutes: 30
        
      - name: Install Python dependencies
        run: |
          curl -sS https://bootstrap.pypa.io/get-pip.py | python3.13
          python3.13 -m pip install --upgrade pip setuptools wheel
          python3.13 -m pip install numpy wheel
          
      - name: Download onnxruntime
        run: |
          git clone --depth 1 --branch v1.24.4 https://github.com/microsoft/onnxruntime
          
      - name: Build onnxruntime
        run: |
          export ANDROID_NDK=$ANDROID_NDK_HOME
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_NDK:$PATH
          cd onnxruntime
          ./build.sh --android --android_abi arm64-v8a \
            --android_sdk_path $ANDROID_SDK_ROOT \
            --android_ndk_path $ANDROID_NDK \
            --python_version 3.13 \
            --build_wheel \
            --config Release \
            --parallel
        timeout-minutes: 300
        
      - name: Upload wheel
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-cp313-aarch64
          path: onnxruntime/build/Release/dist/*.whl
          retention-days: 30
          if-no-files-found: error
          
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: onnxruntime/build/Release/**/*.log
          retention-days: 7
          if-no-files-found: ignore
