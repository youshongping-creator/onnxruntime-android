name: Build onnxruntime for Android (Python 3.13)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install Python 3.13
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install -y python3.13 python3.13-dev python3.13-venv
          python3.13 --version
          
      - name: Install system dependencies
        run: |
          sudo apt-get install -y wget unzip curl git cmake ninja-build openjdk-17-jdk
          
      - name: Download Android SDK command-line tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip
          ls -la $HOME/android-sdk/cmdline-tools/latest/bin/
          
      - name: Setup Android SDK and NDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH
          
          # Accept licenses
          yes | sdkmanager --licenses 2>/dev/null || true
          
          # Install NDK and build tools
          sdkmanager --install "ndk;26b" "platforms;android-21" "build-tools;34.0.0" 2>&1
          
          # Verify installation
          ls -la $HOME/android-sdk/ndk/
          ls -la $HOME/android-sdk/ndk/26b/
        timeout-minutes: 30
        
      - name: Install Python dependencies
        run: |
          curl -sS https://bootstrap.pypa.io/get-pip.py | python3.13
          python3.13 -m pip install --upgrade pip setuptools wheel
          python3.13 -m pip install numpy wheel
          
      - name: Download onnxruntime
        run: |
          git clone --depth 1 --branch v1.24.4 https://github.com/microsoft/onnxruntime
          
      - name: Build onnxruntime
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_NDK_HOME=$HOME/android-sdk/ndk/26b
          
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          ls -la $ANDROID_SDK_ROOT/
          ls -la $ANDROID_NDK_HOME/
          
          cd onnxruntime
          
          # Build with Python binding
          ./build.sh --android --android_abi arm64-v8a \
            --android_sdk_path $ANDROID_SDK_ROOT \
            --android_ndk_path $ANDROID_NDK_HOME \
            --enable_pybind \
            --build_wheel \
            --config Release \
            --parallel
        timeout-minutes: 120
        
      - name: Upload wheel
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-cp313-aarch64
          path: onnxruntime/build/Release/dist/*.whl
          retention-days: 30
          if-no-files-found: error
          
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: onnxruntime/build/Release/**/*.log
          retention-days: 7
