name: Build onnxruntime for Android (Python 3.13)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y \
            python3.13 python3.13-dev python3-pip \
            wget unzip curl git cmake ninja-build \
            openjdk-17-jdk swig \
            Android-sdk cmdline-tools-latest
          curl -sS https://bootstrap.pypa.io/get-pip.py | python3.13
          python3.13 -m pip install --upgrade pip
          python3.13 -m pip install numpy wheel
          
      - name: Download Android NDK
        run: |
          mkdir -p /opt/android-ndk
          cd /opt/android-ndk
          wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
          unzip -q android-ndk-r26b-linux.zip
          echo "ANDROID_NDK_HOME=/opt/android-ndk/android-ndk-r26b" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> $GITHUB_ENV
          
      - name: Download onnxruntime
        run: |
          git clone --depth 1 --branch v1.24.4 https://github.com/microsoft/onnxruntime
          
      - name: Build
        run: |
          export ANDROID_NDK=$ANDROID_NDK_HOME
          export PATH=$ANDROID_NDK:$PATH
          cd onnxruntime
          ./build.sh --android --android_abi arm64-v8a \
            --android_sdk_path /opt/android-sdk \
            --android_ndk_path $ANDROID_NDK \
            --python_version 3.13 \
            --build_wheel \
            --config Release \
            --parallel
        timeout-minutes: 300
        
      - name: Upload wheel
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-cp313-aarch64
          path: onnxruntime/build/Release/dist/*.whl
          retention-days: 30
          if-no-files-found: error
          
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: onnxruntime/build/Release/**/*.log
          retention-days: 7
          if-no-files-found: ignore
